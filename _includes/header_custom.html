<button id="theme-toggle" style="cursor:pointer; background:transparent; border:1px solid #757575; border-radius:4px; padding:4px 8px; margin-left:10px;">
    <span id="theme-icon">🌙</span>
</button>

<style>
    html[data-theme='dark'] {
        --body-background-color: #1a1a1a;
        --text-color: #eeeeee;
        --header-bg-color: #252525;
        --nav-child-link-color: #40c4ff;
        --link-color: #40c4ff;
        --sidebar-color: #252525;
        --search-background-color: #333;
        --table-header-color: #333;
        --code-background-color: #2d2d2d;
    }

    html[data-theme='dark'] body {
        background-color: #1a1a1a !important;
        color: #eeeeee !important;
    }
</style>

<script>
    (function() {
        var toggle = document.getElementById('theme-toggle');
        var html = document.documentElement;

        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            var icon = document.getElementById('theme-icon');
            if (icon) icon.innerText = (theme === 'dark' ? '☀️' : '🌙');

            if (theme === 'dark') {
                document.body.classList.add('dark-theme');
            } else {
                document.body.classList.remove('dark-theme');
            }
        }

        toggle.addEventListener('click', function() {
            var current = html.getAttribute('data-theme') || 'light';
            var next = (current === 'dark' ? 'light' : 'dark');
            localStorage.setItem('theme', next);
            applyTheme(next);
            console.log("Switching to:", next);
        });

        var saved = localStorage.getItem('theme');
        if (saved) applyTheme(saved);
    })();
</script>
