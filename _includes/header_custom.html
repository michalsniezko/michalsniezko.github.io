<button id="theme-toggle" style="cursor:pointer; background:transparent; border:1px solid grey; border-radius:4px; padding:2px 8px; margin-left:10px;">
    <span id="theme-icon">🌙</span>
</button>

<script>
    var toggle = document.getElementById('theme-toggle');
    var html = document.documentElement;

    toggle.onclick = function() {
        var current = html.getAttribute('data-theme') || 'light';
        var next = (current === 'dark') ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        document.getElementById('theme-icon').innerText = (next === 'dark') ? '☀️' : '🌙';
    };

    var saved = localStorage.getItem('theme');
    if (saved) {
        html.setAttribute('data-theme', saved);
        document.getElementById('theme-icon').innerText = (saved === 'dark') ? '☀️' : '🌙';
    }
</script>
